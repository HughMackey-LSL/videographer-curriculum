<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-labelledby="title desc">
  <title id="title">Resolution, codecs, and white balance overview</title>
  <desc id="desc">Three compact panels comparing resolution, codec compression, and Kelvin white balance.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#dbe3ef;stroke-width:2}.sub{fill:#f8fafc;stroke:#dbe3ef;stroke-width:2}.titleText{font:700 28px Inter,Arial,sans-serif;fill:#0f172a}.label{font:700 18px Inter,Arial,sans-serif;fill:#0f172a}.small{font:600 14px Inter,Arial,sans-serif;fill:#475569}.micro{font:700 12px Inter,Arial,sans-serif;fill:#64748b}.greenBox{fill:#dcfce7;stroke:#16a34a;stroke-width:2}.amberBox{fill:#fff7ed;stroke:#d97706;stroke-width:2}
    </style>
    <linearGradient id="kelvin" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset=".45" stop-color="#fff7ed"/>
      <stop offset=".62" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect class="bg" width="900" height="540"/>
  <rect class="panel" x="34" y="34" width="832" height="472" rx="18"/>
  <text x="64" y="82" class="titleText">Resolution, Codecs, and White Balance</text>

  <g transform="translate(62 142)">
    <rect class="sub" x="0" y="0" width="238" height="310" rx="14"/>
    <text x="20" y="34" class="label">Resolution</text>
    <rect x="24" y="64" width="76" height="43" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
    <g stroke="#2563eb" stroke-width="1" opacity=".55">
      <line x1="43" y1="64" x2="43" y2="107"/><line x1="62" y1="64" x2="62" y2="107"/><line x1="81" y1="64" x2="81" y2="107"/>
      <line x1="24" y1="78" x2="100" y2="78"/><line x1="24" y1="92" x2="100" y2="92"/>
    </g>
    <text x="118" y="84" class="label">1080p</text>
    <text x="118" y="106" class="small">Full HD</text>
    <rect x="24" y="142" width="152" height="86" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <g stroke="#2563eb" stroke-width="1" opacity=".45">
      <line x1="43" y1="142" x2="43" y2="228"/><line x1="62" y1="142" x2="62" y2="228"/><line x1="81" y1="142" x2="81" y2="228"/><line x1="100" y1="142" x2="100" y2="228"/><line x1="119" y1="142" x2="119" y2="228"/><line x1="138" y1="142" x2="138" y2="228"/><line x1="157" y1="142" x2="157" y2="228"/>
      <line x1="24" y1="156" x2="176" y2="156"/><line x1="24" y1="170" x2="176" y2="170"/><line x1="24" y1="184" x2="176" y2="184"/><line x1="24" y1="198" x2="176" y2="198"/><line x1="24" y1="212" x2="176" y2="212"/>
    </g>
    <text x="24" y="262" class="label">4K UHD</text>
    <text x="24" y="286" class="small">4x pixel count</text>
  </g>

  <g transform="translate(331 142)">
    <rect class="sub" x="0" y="0" width="238" height="310" rx="14"/>
    <text x="20" y="34" class="label">Codecs</text>
    <rect x="26" y="70" width="48" height="52" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
    <rect x="94" y="70" width="48" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <rect x="162" y="70" width="48" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <path d="M75 96 H92 M143 96 H160" stroke="#475569" stroke-width="2"/>
    <text x="26" y="149" class="micro">I-frame</text>
    <text x="94" y="149" class="micro">delta</text>
    <text x="162" y="149" class="micro">delta</text>
    <rect class="greenBox" x="26" y="184" width="184" height="38" rx="7"/>
    <text x="118" y="209" text-anchor="middle" class="label">Smaller files</text>
    <rect class="amberBox" x="26" y="238" width="184" height="38" rx="7"/>
    <text x="118" y="263" text-anchor="middle" class="label">More decode</text>
  </g>

  <g transform="translate(600 142)">
    <rect class="sub" x="0" y="0" width="238" height="310" rx="14"/>
    <text x="20" y="34" class="label">White Balance</text>
    <rect x="24" y="72" width="190" height="34" rx="17" fill="url(#kelvin)"/>
    <text x="24" y="130" class="small">3200 K</text>
    <text x="156" y="130" class="small">5600 K</text>
    <text x="24" y="153" class="micro">warm</text>
    <text x="172" y="153" class="micro">cool</text>
    <circle cx="76" cy="218" r="34" fill="#fed7aa" stroke="#f97316" stroke-width="3"/>
    <circle cx="160" cy="218" r="34" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/>
    <text x="76" y="224" text-anchor="middle" class="label">W</text>
    <text x="160" y="224" text-anchor="middle" class="label">W</text>
    <text x="119" y="286" text-anchor="middle" class="small">match the source</text>
  </g>
</svg>
