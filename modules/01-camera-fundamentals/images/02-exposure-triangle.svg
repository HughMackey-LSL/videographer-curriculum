<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Exposure triangle diagram</title>
  <desc id="desc">A triangle connecting aperture, shutter speed, and ISO, with the visual side effects of each setting.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#dbe3ef;stroke-width:2}.tri{fill:#eff6ff;stroke:#2563eb;stroke-width:4}.node{fill:#fff;stroke:#2563eb;stroke-width:3}.titleText{font:700 28px Inter,Arial,sans-serif;fill:#0f172a}.label{font:700 18px Inter,Arial,sans-serif;fill:#0f172a}.small{font:600 14px Inter,Arial,sans-serif;fill:#475569}.micro{font:600 12px Inter,Arial,sans-serif;fill:#64748b}.blue{fill:#2563eb}.line{stroke:#94a3b8;stroke-width:2}
    </style>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset=".55" stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </radialGradient>
  </defs>
  <rect class="bg" width="900" height="520"/>
  <rect class="panel" x="34" y="34" width="832" height="452" rx="18"/>
  <text x="64" y="82" class="titleText">The Exposure Triangle</text>

  <polygon class="tri" points="450,124 220,386 680,386"/>
  <circle class="node" cx="450" cy="124" r="74"/>
  <circle class="node" cx="220" cy="386" r="74"/>
  <circle class="node" cx="680" cy="386" r="74"/>
  <circle fill="#fff" stroke="#0f172a" stroke-width="3" cx="450" cy="260" r="50"/>
  <text x="450" y="255" text-anchor="middle" class="label">Exposure</text>
  <text x="450" y="278" text-anchor="middle" class="small">brightness</text>

  <text x="450" y="105" text-anchor="middle" class="label">Aperture</text>
  <text x="450" y="130" text-anchor="middle" class="small">f-stop</text>
  <circle cx="450" cy="154" r="18" fill="url(#iris)"/>
  <circle cx="450" cy="154" r="7" fill="#0f172a"/>
  <text x="450" y="187" text-anchor="middle" class="micro">depth of field</text>

  <text x="220" y="365" text-anchor="middle" class="label">Shutter</text>
  <text x="220" y="390" text-anchor="middle" class="small">time</text>
  <line x1="177" y1="418" x2="263" y2="418" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <circle cx="214" cy="418" r="8" class="blue"/>
  <circle cx="230" cy="418" r="8" fill="#60a5fa" opacity=".6"/>
  <circle cx="246" cy="418" r="8" fill="#93c5fd" opacity=".4"/>
  <text x="220" y="450" text-anchor="middle" class="micro">motion blur</text>

  <text x="680" y="365" text-anchor="middle" class="label">ISO / Gain</text>
  <text x="680" y="390" text-anchor="middle" class="small">amplify</text>
  <rect x="643" y="409" width="74" height="26" rx="6" fill="#111827"/>
  <g fill="#f8fafc">
    <circle cx="653" cy="416" r="1.8"/><circle cx="667" cy="427" r="1.6"/><circle cx="683" cy="416" r="1.4"/>
    <circle cx="697" cy="429" r="1.8"/><circle cx="711" cy="418" r="1.5"/><circle cx="660" cy="433" r="1.2"/>
    <circle cx="689" cy="431" r="1.1"/><circle cx="716" cy="431" r="1.2"/>
  </g>
  <text x="680" y="450" text-anchor="middle" class="micro">noise</text>

  <line class="line" x1="325" y1="386" x2="575" y2="386"/>
  <text x="450" y="424" text-anchor="middle" class="small">Change one setting, compensate with another.</text>
</svg>
