<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" role="img" aria-labelledby="title desc">
  <title id="title">Stabilization and support tool chooser</title>
  <desc id="desc">A visual chooser comparing tripod, handheld technique, image stabilization, and gimbal support.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#dbe3ef;stroke-width:2}.card{fill:#f8fafc;stroke:#dbe3ef;stroke-width:2}.titleText{font:700 28px Inter,Arial,sans-serif;fill:#0f172a}.label{font:700 18px Inter,Arial,sans-serif;fill:#0f172a}.small{font:600 13px Inter,Arial,sans-serif;fill:#475569}.dark{fill:#0f172a}.line{stroke:#64748b;stroke-width:4;fill:none;stroke-linecap:round}.thin{stroke:#94a3b8;stroke-width:2;fill:none}
    </style>
  </defs>
  <rect class="bg" width="900" height="540"/>
  <rect class="panel" x="34" y="34" width="832" height="472" rx="18"/>
  <text x="64" y="82" class="titleText">Stabilization and Support</text>

  <g transform="translate(62 145)">
    <rect class="card" x="0" y="0" width="178" height="280" rx="14"/>
    <text x="22" y="34" class="label">Tripod</text>
    <rect x="64" y="68" width="50" height="30" rx="6" class="dark"/>
    <circle cx="116" cy="83" r="15" fill="#334155"/>
    <line class="line" x1="90" y1="98" x2="90" y2="218"/>
    <line class="line" x1="90" y1="138" x2="38" y2="238"/>
    <line class="line" x1="90" y1="138" x2="142" y2="238"/>
    <path class="thin" d="M126 76 C150 64 158 64 166 72"/>
    <text x="22" y="252" class="small">locked-off</text>
    <text x="22" y="270" class="small">interviews</text>
  </g>

  <g transform="translate(260 145)">
    <rect class="card" x="0" y="0" width="178" height="280" rx="14"/>
    <text x="22" y="34" class="label">Handheld</text>
    <circle cx="88" cy="78" r="23" fill="#f8c9aa"/>
    <rect x="63" y="104" width="50" height="72" rx="16" fill="#2563eb"/>
    <rect x="101" y="120" width="44" height="24" rx="6" class="dark"/>
    <circle cx="145" cy="132" r="10" fill="#334155"/>
    <path class="line" d="M67 126 L37 166 M109 126 L144 166"/>
    <path class="thin" d="M40 199 C58 186 78 186 94 199 C112 212 136 212 152 199" stroke="#16a34a"/>
    <text x="22" y="252" class="small">controlled</text>
    <text x="22" y="270" class="small">movement</text>
  </g>

  <g transform="translate(458 145)">
    <rect class="card" x="0" y="0" width="178" height="280" rx="14"/>
    <text x="22" y="34" class="label">IBIS / OIS</text>
    <rect x="48" y="78" width="82" height="66" rx="10" fill="#0f172a"/>
    <rect x="77" y="98" width="24" height="24" rx="4" fill="#38bdf8"/>
    <circle cx="132" cy="111" r="18" fill="#334155"/>
    <path d="M55 176 C70 156 102 156 118 176" stroke="#0891b2" stroke-width="5" fill="none"/>
    <path d="M61 201 C78 181 112 181 130 201" stroke="#0891b2" stroke-width="5" fill="none" opacity=".65"/>
    <text x="22" y="252" class="small">shake</text>
    <text x="22" y="270" class="small">reduction</text>
  </g>

  <g transform="translate(656 145)">
    <rect class="card" x="0" y="0" width="178" height="280" rx="14"/>
    <text x="22" y="34" class="label">Gimbal</text>
    <path class="line" d="M90 66 V104 H126 V154 H88"/>
    <rect x="50" y="134" width="72" height="45" rx="8" class="dark"/>
    <circle cx="123" cy="156" r="15" fill="#334155"/>
    <path class="thin" d="M50 214 C76 194 111 194 138 214" stroke="#d97706" stroke-width="4"/>
    <text x="22" y="252" class="small">walking</text>
    <text x="22" y="270" class="small">shots</text>
  </g>
</svg>
